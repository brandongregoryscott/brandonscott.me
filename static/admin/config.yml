# backend:
#     name: git-gateway
#     branch: main

# Uncomment for local development
backend:
    name: test-repo

media_folder: "static/media"
public_folder: "/media"

# Uncomment to leverage Netlify CMS UI authoring flow
# see: https://www.netlifycms.org/docs/configuration-options/#publish-mode
# publish_mode: editorial_workflow

collections:
    - name: "posts"
      label: "Posts"
      folder: "content/posts"
      create: true
      slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
      preview_path: "posts/{{fields.slug}}"
      fields:
          - {
                label: "Template",
                name: "template",
                widget: "hidden",
                default: "post",
            }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Slug", name: "slug", widget: "string" }
          - {
                label: "Social Image",
                name: "socialImage",
                required: false,
                widget: "image",
            }
          - {
                label: "Draft",
                name: "draft",
                widget: "boolean",
                required: false,
                default: true,
            }
          - { label: "Publish Date", name: "date", widget: "datetime" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Category", name: "category", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
          - { label: "Tags", name: "tags", widget: "list" }

    - name: "pages"
      label: "Pages"
      folder: "content/pages"
      create: true
      slug: "{{slug}}"
      fields:
          - {
                label: "Template",
                name: "template",
                widget: "hidden",
                default: "page",
            }
          - { label: "Title", name: "title", required: false, widget: "string" }
          - {
                label: "Show title",
                name: "showTitle",
                widget: "boolean",
                required: false,
                default: false,
            }
          - { label: "Slug", name: "slug", widget: "string" }
          - {
                label: "Social Image",
                name: "socialImage",
                required: false,
                widget: "image",
            }
          - {
                label: "Draft",
                name: "draft",
                widget: "boolean",
                required: false,
                default: true,
            }
          - { label: "Body", name: "body", widget: "markdown" }

    - name: "projects"
      label: "Projects"
      folder: "content/projects"
      create: true
      fields:
          - {
                label: "Template",
                name: "template",
                widget: "hidden",
                default: "project",
            }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Position", name: "position", widget: "number" }
          - { label: "Repo", name: "repo", widget: "string" }
          - { label: "URL", name: "url", required: false, widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
